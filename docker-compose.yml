# =============================================================================
# HackaMineD / Docling AI — dev orchestration
# =============================================================================
# NGINX is the SINGLE public entry point (port 80). It reverse-proxies to:
#   - backend       (Node/Express, :3000) — auth, projects        [internal only]
#   - backend_ai    (Python/FastAPI, :8000) — chatbot, deepscan,   [internal only]
#                    file-editor, toolkit (one app, many routers)
#
# Only nginx (:80) and mongo (:27017 dev convenience) are published to the host.
# backend and backend_ai are internal-only — reachable only inside Docker via NGINX.
# This is the production security posture: one public door.
#
# Boot everything:
#     docker compose up --build
#
# Frontend (Vite) runs locally for HMR — `cd frontend && npm run dev`.
# The Vite dev proxy forwards /api/* → http://localhost:80 (NGINX), so run
# docker compose first and then npm run dev.
#
# Notes:
#  * Persistent SQLite/data lives bind-mounted under backend_ai/data/.
#  * Required secrets read from a repo-root .env file (see .env.example).
# =============================================================================

services:

  # ── Reverse proxy — the only publicly exposed service ──────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Mount our config read-only over NGINX's default site config.
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - backend_ai

  # ── Dozzle — real-time log viewer (dev only, remove before production) ────────
  # Visit http://localhost:9999 to stream logs from all containers in your browser.
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/hackamined
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    volumes:
      - ./backend:/app                   # live-reload: code changes reflect instantly
      - express-node-modules:/app/node_modules
    # No ports — Express is internal-only. NGINX reaches it at backend:3000.
    depends_on:
      mongo:
        condition: service_healthy

  backend_ai:
    build:
      context: .
      dockerfile: backend_ai/Dockerfile
    working_dir: /repo
    environment:
      BACKEND_AI_HOST: 0.0.0.0
      BACKEND_AI_PORT: 8000
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LATEX_MODEL: ${LATEX_MODEL:-openai/gpt-oss-120b}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      # backend_ai/main.py pins these to backend_ai/data/* automatically.
    volumes:
      - ./:/repo                         # live-reload: code changes reflect instantly
      - tectonic-cache:/root/.cache/Tectonic  # cache TeX packages across restarts
    # No ports — FastAPI is internal-only. NGINX reaches it at backend_ai:8000.

volumes:
  mongo-data:
  express-node-modules:
  tectonic-cache:
