<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LaTeX Compiler</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#2563eb;
color:white;
padding:12px 20px;
font-size:20px;
font-weight:bold;
}

.container{
flex:1;
display:flex;
}

.editor{
width:50%;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
}

.preview{
width:50%;
background:#525659;
}

.toolbar{
padding:10px;
background:#f3f4f6;
border-bottom:1px solid #ddd;
}

textarea{
flex:1;
border:none;
outline:none;
padding:15px;
font-family:monospace;
font-size:14px;
resize:none;
}

iframe{
width:100%;
height:100%;
border:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.status{
margin-left:10px;
color:#555;
}

</style>

</head>

<body>

<header>
LaTeX Online Compiler
</header>

<div class="container">

<div class="editor">

<div class="toolbar">
<button onclick="compileLatex()">Compile PDF</button>
<span class="status" id="status">Ready</span>
</div>

<textarea id="latexCode">
\documentclass{article}
\begin{document}

Hello World!

\section{Example}

This is a working LaTeX preview.

\end{document}
</textarea>

</div>

<div class="preview">
<iframe name="pdfFrame"></iframe>
</div>

</div>

<!-- Hidden Form -->
<form
id="latexForm"
action="https://texlive.net/cgi-bin/latexcgi"
method="POST"
target="pdfFrame"
style="display:none"
>

<input type="hidden" name="filecontents[]" id="latexInput">
<input type="hidden" name="filename[]" value="document.tex">
<input type="hidden" name="engine" value="pdflatex">
<input type="hidden" name="return" value="pdf">

</form>

<script>

function sanitizeLatex(code){

if(!code.includes("\\begin{document}")){
return "\\documentclass{article}\n\\begin{document}\n"+code+"\n\\end{document}";
}

return code;

}

function compileLatex(){

const code = document.getElementById("latexCode").value;
const status = document.getElementById("status");

status.innerText="Compiling...";

document.getElementById("latexInput").value=sanitizeLatex(code);

document.getElementById("latexForm").submit();

setTimeout(()=>{
status.innerText="Compiled successfully";
},1500);

}

// Ctrl + Enter shortcut
document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.key==="Enter"){
compileLatex();
}
});

</script>

</body>
</html>
