# =============================================================================
# NGINX reverse proxy — Docling AI (Phase E.2)
# =============================================================================
# NGINX is the SINGLE public entry point. Every request from the internet hits
# this config first, and NGINX forwards it to the right backend on the internal
# Docker network. The backends (Express :3000, FastAPI :8000) are NOT exposed to
# the host — only NGINX's port 80 is.
#
#   Browser ──▶ nginx:80 ─┬─ /api/auth/*      ──▶ backend:3000     (Express)
#                         ├─ /api/projects/*  ──▶ backend:3000     (Express)
#                         └─ /api/ai/*         ──▶ backend_ai:8000  (FastAPI, SSE)
#
# "backend" and "backend_ai" are Docker Compose SERVICE NAMES. Docker's internal
# DNS resolves them to each container's private IP — the same mechanism that lets
# the app reach "mongo:27017".
# =============================================================================

# ──────────────────────────────────────────────────────────────────────────────
# Rate-limit zones (defined at the http level via this conf being included).
# A "zone" is a shared-memory bucket that counts requests per client IP.
#   $binary_remote_addr = the client IP in compact binary form (the key)
#   zone=NAME:10m       = name + 10 MB of memory (~160k IPs tracked)
#   rate=Nr/s|Nr/m      = sustained allowed rate
# These just DEFINE the limits; each `location` below opts in with `limit_req`.
# ──────────────────────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=ai_zone:10m   rate=10r/s;  # expensive LLM calls
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;   # brute-force guard on login

server {
    listen 80;
    server_name _;   # "_" = match any hostname (fine until you have a real domain)

    # ──────────────────────────────────────────────────────────────────────────
    # ⚠️  UPLOAD-SIZE — MANDATORY. NGINX rejects request bodies over 1 MB by
    #     DEFAULT, which would silently break DeepScan + Toolkit .docx/.pdf
    #     uploads with a 413 error. Raise it to cover real manuscripts.
    # ──────────────────────────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ──────────────────────────────────────────────────────────────────────────
    # AI routes  →  FastAPI.  The TRAILING SLASH on proxy_pass is what strips the
    # "/api/ai" prefix: /api/ai/deepscan/x  →  /deepscan/x  (FastAPI's native path).
    # ──────────────────────────────────────────────────────────────────────────
    location /api/ai/ {
        proxy_pass http://backend_ai:8000/;

        limit_req zone=ai_zone burst=20 nodelay;  # allow short bursts, then 429

        # ── SSE-CRITICAL: stream events live instead of buffering ──────────────
        # FastAPI's DeepScan emits Server-Sent Events over a 60–120s connection.
        # proxy_buffering off  = forward each chunk the instant it arrives (this
        #   is NGINX's hard network-layer guarantee that Express couldn't make).
        # HTTP/1.1 + empty Connection = keep the long-lived stream open.
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;   # don't cut the stream mid-run
        proxy_send_timeout 600s;

        # Pass the user's JWT through unchanged — FastAPI stays the auth authority.
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # Auth routes  →  Express.  NO trailing slash on proxy_pass → the FULL path
    # is preserved (Express mounts its router at "/api/auth"). Stricter rate
    # limit here to blunt password brute-forcing.
    # ──────────────────────────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://backend:3000;

        limit_req zone=auth_zone burst=5 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # Project routes  →  Express (also full-path-preserved, no trailing slash).
    # ──────────────────────────────────────────────────────────────────────────
    location /api/projects/ {
        proxy_pass http://backend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # A tiny health endpoint so you can curl the proxy itself.
    location = /nginx-health {
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# TLS / HTTPS (enable LATER, when you have a real domain) — see the plan.
# -----------------------------------------------------------------------------
# In production you swap the `listen 80;` above for an HTTP→HTTPS redirect and
# move every `location` into a 443 block that "terminates" TLS (decrypts HTTPS
# at NGINX; the backends keep speaking plain HTTP internally). Free auto-renewing
# certs come from Let's Encrypt via certbot:  `certbot --nginx -d yourdomain.com`.
#
#   server {
#       listen 80;
#       server_name yourdomain.com;
#       return 301 https://$host$request_uri;   # force HTTPS
#   }
#   server {
#       listen 443 ssl;
#       server_name yourdomain.com;
#       ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
#       ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
#       client_max_body_size 50M;
#       # ... the same three location blocks as above ...
#   }
# =============================================================================
