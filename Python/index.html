<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Manuscript Formatter</title>
    <!-- Tailwind CSS & Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <!-- Marked.js for Markdown Preview -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Highlight.js for LaTeX Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-6xl mx-auto py-10 px-4">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">Multi-Agent Manuscript Formatter</h1>
            <p class="text-gray-500 text-lg">Upload your raw manuscript and let our AI agents reconstruct it instantly.
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-8">

            <!-- Left Column: Controls -->
            <div class="w-full md:w-1/3 space-y-6">
                <div class="bg-white rounded-xl shadow-lg p-6 border border-gray-100">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>⚙️</span> Configuration
                    </h2>

                    <form id="reconstruct-form" class="space-y-4">
                        <!-- File Upload -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Upload File
                                (PDF/DOCX/TEX)</label>
                            <input type="file" id="file" name="file" accept=".pdf,.docx,.tex" required class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-full file:border-0
                            file:text-sm file:font-semibold
                            file:bg-blue-50 file:text-blue-700
                            hover:file:bg-blue-100 cursor-pointer" />
                        </div>

                        <!-- Target Style -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Target Style</label>
                            <select id="format_style" name="format_style"
                                class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="IEEE">IEEE</option>
                                <option value="Vancouver">Vancouver</option>
                                <option value="APA">APA</option>
                                <option value="MLA">MLA</option>
                                <option value="Chicago">Chicago</option>
                            </select>
                        </div>

                        <!-- Custom Rules -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Custom Rules (Optional)</label>
                            <textarea id="custom_rules" name="custom_rules" rows="3"
                                placeholder="E.g., Force author-date format for all references."
                                class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
                        </div>

                        <!-- API Model -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">LLM Engine</label>
                            <select id="model" name="model"
                                class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                <option value="meta-llama/llama-4-maverick-17b-128e-instruct">LLaMA-4-Maverick 17b
                                </option>
                                <option value="qwen/qwen3-32b">Qwen-3 32b</option>
                            </select>
                        </div>

                        <button type="submit" id="submit-btn"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md">
                            Start Reconstruction
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Output -->
            <div class="w-full md:w-2/3 space-y-6">

                <!-- Streaming Live Status Terminal -->
                <div id="status-container" class="hidden bg-gray-900 rounded-xl shadow-lg p-4 border border-gray-800">
                    <div class="flex items-center gap-3 mb-3 border-b border-gray-700 pb-2">
                        <div class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5"
                            id="loader"></div>
                        <span class="text-white font-mono text-sm tracking-widest font-bold">TERMINAL STATUS</span>
                    </div>
                    <div id="live-logs" class="h-40 overflow-y-auto font-mono text-xs text-green-400 space-y-1">
                        <!-- Logs stream here -->
                    </div>
                </div>

                <!-- Spell Check Alerts -->
                <div id="spell-alerts"
                    class="hidden bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-xl shadow-sm">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="ml-3">
                            <h3 class="text-sm font-medium text-yellow-800" id="spell-title">Spell Check Warnings</h3>
                            <div class="mt-2 text-sm text-yellow-700" id="spell-list"></div>
                        </div>
                    </div>
                </div>

                <!-- Final Payload Output -->
                <div id="output-container" class="hidden space-y-6">

                    <div class="flex gap-4">
                        <button id="dl-md"
                            class="flex-1 bg-gray-800 hover:bg-black text-white py-3 rounded-xl font-bold transition flex justify-center items-center gap-2">
                            📥 Download Markdown
                        </button>
                        <button id="dl-tex"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition flex justify-center items-center gap-2">
                            📥 Download LaTeX
                        </button>
                    </div>

                    <!-- Tabs for Markdown/Latex viewing -->
                    <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
                        <div class="flex border-b border-gray-200">
                            <button id="tab-md"
                                class="flex-1 py-3 bg-gray-50 text-blue-600 font-bold border-b-2 border-blue-600">Markdown
                                Source</button>
                            <button id="tab-tex"
                                class="flex-1 py-3 text-gray-500 font-medium hover:text-gray-700 border-b-2 border-transparent">LaTeX
                                Source</button>
                        </div>
                        <div class="bg-gray-50 border-t border-gray-200">
                            <!-- Render container -->
                            <div id="output-viewer"
                                class="w-full h-[600px] overflow-y-auto p-8 prose prose-blue max-w-none"></div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('reconstruct-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusContainer = document.getElementById('status-container');
        const liveLogs = document.getElementById('live-logs');
        const loader = document.getElementById('loader');

        const outputContainer = document.getElementById('output-container');
        const outputViewer = document.getElementById('output-viewer');

        const spellAlerts = document.getElementById('spell-alerts');
        const spellTitle = document.getElementById('spell-title');
        const spellList = document.getElementById('spell-list');

        let finalPayloadData = null;

        // Security helper for injecting LaTeX source code strings
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // View Tabs Mapping
        document.getElementById('tab-md').addEventListener('click', (e) => {
            if (!finalPayloadData) return;
            e.target.className = "flex-1 py-3 bg-gray-50 text-blue-600 font-bold border-b-2 border-blue-600";
            document.getElementById('tab-tex').className = "flex-1 py-3 text-gray-500 font-medium hover:text-gray-700 border-b-2 border-transparent";

            // Format and render using Marked.js
            outputViewer.className = "w-full h-[600px] overflow-y-auto p-8 prose prose-blue max-w-none bg-white";
            outputViewer.innerHTML = marked.parse(finalPayloadData.markdown);
        });

        document.getElementById('tab-tex').addEventListener('click', (e) => {
            if (!finalPayloadData) return;
            e.target.className = "flex-1 py-3 bg-gray-50 text-blue-600 font-bold border-b-2 border-blue-600";
            document.getElementById('tab-md').className = "flex-1 py-3 text-gray-500 font-medium hover:text-gray-700 border-b-2 border-transparent";

            // Format and render as raw LaTeX syntax code
            outputViewer.className = "w-full h-[600px] overflow-y-auto p-1 bg-gray-50 m-0 text-sm";
            outputViewer.innerHTML = `<pre><code class="language-latex font-mono break-all">${escapeHtml(finalPayloadData.latex)}</code></pre>`;
            hljs.highlightElement(outputViewer.querySelector('code'));
        });

        // Download helpers
        const triggerDownload = (filename, text) => {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        };

        document.getElementById('dl-md').addEventListener('click', () => {
            if (finalPayloadData) {
                triggerDownload(`reconstructed_${document.getElementById('format_style').value.toLowerCase()}.md`, finalPayloadData.markdown);
            }
        });

        document.getElementById('dl-tex').addEventListener('click', () => {
            if (finalPayloadData) {
                triggerDownload(`reconstructed_${document.getElementById('format_style').value.toLowerCase()}.tex`, finalPayloadData.latex);
            }
        });

        // Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI Reset
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            statusContainer.classList.remove('hidden');
            outputContainer.classList.add('hidden');
            spellAlerts.classList.add('hidden');
            loader.classList.remove('hidden');
            liveLogs.innerHTML = "";
            finalPayloadData = null;

            const formData = new FormData(form);

            try {
                // Using fetch to read streams chunk by chunk
                const response = await fetch('http://127.0.0.1:8000/api/v2/reconstruct/stream', {
                    method: 'POST',
                    body: formData
                });

                if (!response.body) throw Error('ReadableStream not supported');

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                let done = false;
                let buffer = "";

                while (!done) {
                    const { value, done: readerDone } = await reader.read();
                    done = readerDone;

                    if (value) {
                        buffer += decoder.decode(value, { stream: true });
                    }

                    // SSE chunks are delimited by two newlines
                    const chunks = buffer.split("\n\n");

                    // The last chunk might be incomplete, keep it in the buffer
                    buffer = chunks.pop();

                    for (const chunk of chunks) {
                        if (chunk.trim() === "") continue;

                        if (chunk.startsWith("data: ")) {
                            try {
                                const jsonStr = chunk.substring(6);
                                const payload = JSON.parse(jsonStr);

                                // Regular Log message
                                if (payload.log) {
                                    const p = document.createElement("p");
                                    p.innerHTML = `> ${payload.log}`;
                                    liveLogs.appendChild(p);
                                    liveLogs.scrollTop = liveLogs.scrollHeight; // auto scroll
                                }

                                // Intermediate error logs (Spell errors)
                                if (payload.errors && payload.errors.length > 0 && !payload.is_final) {
                                    spellAlerts.classList.remove('hidden');
                                    spellTitle.innerText = `Found ${payload.errors.length} spelling errors`;
                                    spellList.innerText = payload.errors.join(", ");
                                }

                                // Final completed payload!
                                if (payload.is_final) {
                                    loader.classList.add('hidden');
                                    finalPayloadData = payload;

                                    // Trigger Output display UI
                                    outputContainer.classList.remove('hidden');

                                    // By default show markdown tab
                                    document.getElementById('tab-md').click();

                                    submitBtn.disabled = false;
                                    submitBtn.innerText = "Reconstruct Another";
                                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                                }

                                if (payload.error) {
                                    throw new Error(payload.error);
                                }
                            } catch (err) {
                                console.warn("Failed to parse SSE payload block", err);
                            }
                        }
                    }
                }
            } catch (error) {
                const p = document.createElement("p");
                p.className = "text-red-500 font-bold";
                p.innerHTML = `> Error: ${error.message}`;
                liveLogs.appendChild(p);

                submitBtn.disabled = false;
                submitBtn.innerText = "Try Again";
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loader.classList.add('hidden');
            }
        });

    </script>
</body>

</html>
